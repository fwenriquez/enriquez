<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#131328">
  <title>The Enriquez Family</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: #1a1a2e; }

    body {
      background: linear-gradient(#131328, #1a1a2e 55%, #222240);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100svh;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      image-rendering: pixelated;
    }

    .scene {
      text-align: center;
      animation: fadein 1.4s ease-out both;
    }

    .family {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
    }

    .pixel-char {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .row {
      display: flex;
    }

    .p { width: 8px; height: 8px; }

    /* Colors */
    .skin { background: #f5c5a3; }
    .hair-d { background: #4a2c0a; }
    .hair-l { background: #c87533; }
    .hair-r { background: #d44; }
    .shirt-b { background: #3a86c8; }
    .shirt-p { background: #e07aad; }
    .shirt-g { background: #5ab55a; }
    .shirt-y { background: #e8c840; }
    .shirt-o { background: #e8833a; }
    .pants { background: #3a3a6a; }
    .pants-k { background: #5a4a3a; }
    .shoe { background: #2a2a2a; }
    .eye { background: #222; }
    .mouth { background: #d46a6a; }
    .cat-b { background: #555; }
    .cat-e { background: #6d6; }
    .cat-n { background: #faa; }
    .cat-w { background: #ddd; }
    .x { background: transparent; }

    /* The cat slow-blinks now and then */
    .cat-e { animation: blink-cat 8s linear var(--blink, 0s) infinite; }

    .ground {
      width: 100%;
      height: 4px;
      background: linear-gradient(#2f652f 50%, #224a22 50%);
      margin-top: 0;
      border-radius: 2px;
    }

    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      animation: fadein 2.4s ease-out both;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      opacity: 0.4;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    .shooting-star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      box-shadow:
        2px -2px 0 rgba(255, 255, 255, 0.7),
        4px -4px 0 rgba(255, 255, 255, 0.45),
        6px -6px 0 rgba(255, 255, 255, 0.25),
        8px -8px 0 rgba(255, 255, 255, 0.1);
      animation: shoot 1.1s ease-out forwards;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 0.8; }
    }

    @keyframes blink-cat {
      0%, 90% { background: #6d6; }
      91%, 97% { background: #555; }
      98%, 100% { background: #6d6; }
    }

    @keyframes shoot {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.9; }
      100% { transform: translate(-110px, 110px); opacity: 0; }
    }

    @keyframes fadein {
      from { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="scene">
    <div class="family" id="family" role="img" aria-label="Pixel-art portrait of the Enriquez family: two parents, three kids, and the cat"></div>
    <div class="ground" style="width:320px; margin:0 auto;"></div>
  </div>

  <script>
    // Star background
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() < 0.15 ? 3 : 2;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 60 + '%';
      s.style.animationDuration = 2.5 + Math.random() * 2 + 's';
      s.style.animationDelay = -Math.random() * 4 + 's';
      starsEl.appendChild(s);
    }

    // A rare shooting star, every 7-18 seconds
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function scheduleShootingStar() {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'shooting-star';
        s.style.left = 25 + Math.random() * 55 + '%';
        s.style.top = 5 + Math.random() * 25 + '%';
        s.addEventListener('animationend', () => s.remove());
        starsEl.appendChild(s);
        scheduleShootingStar();
      }, 7000 + Math.random() * 11000);
    }
    if (!reducedMotion) scheduleShootingStar();

    /*
      Each character is defined as a grid of color codes.
      . = transparent, S = skin, D = dark hair, L = light hair,
      R = red hair, B = blue shirt, P = pink shirt, G = green shirt,
      Y = yellow shirt, O = orange shirt, N = pants, K = khaki pants,
      H = shoe, E = eye, M = mouth,
      C = cat body, W = cat white, F = cat eye, Q = cat nose
    */

    const colorMap = {
      '.': 'x', 'S': 'skin', 'D': 'hair-d', 'L': 'hair-l', 'R': 'hair-r',
      'B': 'shirt-b', 'P': 'shirt-p', 'G': 'shirt-g', 'Y': 'shirt-y',
      'O': 'shirt-o', 'N': 'pants', 'K': 'pants-k', 'H': 'shoe',
      'E': 'eye', 'M': 'mouth', 'C': 'cat-b', 'W': 'cat-w',
      'F': 'cat-e', 'Q': 'cat-n'
    };

    // Dad - tall, dark hair, blue shirt
    const dad = [
      '.DDD.',
      'DDDDD',
      'SESED',
      'SSMSS',
      '.SSS.',
      'BBBBB',
      'BBBBB',
      'BBBBB',
      '.NNN.',
      '.NNN.',
      '.H.H.',
    ];

    // Mom - tall, dark hair, pink shirt
    const mom = [
      '.DDD.',
      'DDDDD',
      'DESED',
      'DSMSD',
      '.SSS.',
      'PPPPP',
      'PPPPP',
      'PPPPP',
      '.KKK.',
      '.KKK.',
      '.H.H.',
    ];

    // Kid 1 - medium, dark hair, green shirt
    const kid1 = [
      '...',
      '...',
      '.D.',
      'DDD',
      'EDE',
      'SMS',
      'GGG',
      'GGG',
      'NNN',
      'NNN',
      'H.H',
    ];

    // Kid 2 - small, dark hair, yellow shirt
    const kid2 = [
      '...',
      '...',
      '...',
      '.D.',
      'DDD',
      'EDE',
      'SMS',
      'YYY',
      'YYY',
      'NNN',
      'H.H',
    ];

    // Kid 3 - small, dark hair, orange shirt
    const kid3 = [
      '...',
      '...',
      '...',
      '.D.',
      'DDD',
      'EDE',
      'SMS',
      'OOO',
      'OOO',
      'NNN',
      'H.H',
    ];

    // Cat - small, grey with green eyes
    const cat = [
      '....',
      '....',
      '....',
      '....',
      '....',
      'C..C',
      'CCCC',
      'FCFC',
      'CQCC',
      'CCCC',
      '.CC.',
    ];

    function buildGrid(grid) {
      const div = document.createElement('div');
      grid.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';
        for (const ch of row) {
          const px = document.createElement('div');
          px.className = 'p ' + (colorMap[ch] || 'x');
          rowDiv.appendChild(px);
        }
        div.appendChild(rowDiv);
      });
      return div;
    }

    const characters = [kid2, dad, kid1, mom, kid3, cat];

    const familyEl = document.getElementById('family');

    characters.forEach(charGrid => {
      const charDiv = buildGrid(charGrid);
      charDiv.className = 'pixel-char';
      charDiv.style.setProperty('--blink', (-Math.random() * 6).toFixed(1) + 's');
      familyEl.appendChild(charDiv);
    });
  </script>

</body>
</html>
